<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Links Profissional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* CONFIGURAÇÃO DO CORPO E FUNDO */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Gradiente radial baseado na identidade da Giganet */
            background: radial-gradient(circle at center, #ff8c00 0%, #b33612 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        /* CABEÇALHO (TEXTO + ROBÔ) */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            font-size: 2.5rem;
        }

        .robot-img {
            width: 150px;
            height: auto;
            /* Filtro opcional para dar um leve brilho ao robô */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* GRID DE BOTÕES */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            padding: 20px 0;
        }

        /* ESTILO DOS CARDS */
        .card {
            background: white;
            padding: 25px 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #d84315; /* Cor do texto padrão */
            text-align: center;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HOVER DO CARD (QUANDO PASSA O MOUSE) */
        .card:hover {
            transform: translateY(-8px);
            background: #1c1e21; /* Fundo escuro igual ao menu do site */
            color: white;        /* Texto do card fica branco */
            border-color: white;
        }

        /* CONTAINER DO ÍCONE */
        .icon-container {
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .icon-container i, .icon-container img {
            font-size: 65px;
            height: 65px;
            transition: all 0.3s ease;
            object-fit: contain; /* Garante que a imagem não distorça */
        }

        /* MELHORIA DE CONTRASTE NO HOVER */
        
        /* 1. Se for imagem PNG (MK Solution, etc) */
        .card:hover .icon-container img {
            filter: brightness(0) invert(1);
        }

        /* 2. Se for ícone Font Awesome (WhatsApp, etc) */
        .card:hover .icon-container i {
            color: white !important;
        }
        /* O Fundo do Modal (Preto com transparência) */
        .modal {
            display: none; /* Escondido por padrão */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        
        /* A "Caixa" onde o PDF vai aparecer */
        .modal-conteudo {
            position: relative;
            margin: 2% auto;
            width: 80%;
            height: 90%;
            background-color: white;
            border-radius: 10px;
        }
        
        /* O botão de fechar (X) */
        .fechar {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 35px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            z-index: 1001;
        }
        
        /* O Iframe em si */
        #pdfFrame {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
        <h1 style="margin: 0;">Central de Acessos</h1>
        <img src="imagens/gigabot02.png" alt="gigabot" style="width: 150px; height: auto;">
    </div>

    <div class="grid-container">
        
        <a href="https://mk.gigams.com.br/mk" target="_blank" class="card">
            <img src="imagens/mk.png" alt="MK Solutions" style="width: 50px; height: 50px; margin-bottom: 15px;">
            MK Solutions
        </a>

        <a href="https://10.3.1.15:8081/entrar" target="_blank" class="card">
            <img src="imagens/made.png" alt="Made 4 Graph" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Made 4 Graph
        </a>

        <a href="https://giganetms.newave.one/#/panel" target="_blank" class="card">
            <img src="imagens/one.png" alt="Newave" style="width: 125px; height: 50px; margin-bottom: 15px;">
            Newave
        </a>

        <a href="https://downdetector.com.br/" target="_blank" class="card">
            <img src="imagens/dow.png" alt="DOWNDETECTOR" style="width: 50px; height: 50px; margin-bottom: 15px;">
            DOWNDETECTOR
        </a>

        <a href="https://web.whatsapp.com/" target="_blank" class="card">
            <img src="imagens/whats.png" alt="Whatsapp" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Whatsapp
        </a>

        <a href="https://teams.live.com/" target="_blank" class="card">
            <img src="imagens/teams.png" alt="Teams" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Teams
        </a>

        <a href="https://extranet.oletelecom.com.br/login.php?retorno=/" target="_blank" class="card">
            <img src="imagens/ole.png" alt="Olé TV" style="width: 100px; height: 50px; margin-bottom: 15px;">
            Olé TV
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1PZzEqx6E8VCxQgoVDQJRCM0CoolHWzNGGee0AzcfCcc/edit?gid=0#gid=0" target="_blank" class="card">
            <div class="icon-container">
                <img src="imagens/ramais.png" alt="RAMAIS">
            </div>
            RAMAIS
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1oIu-h83sgEKdUXHLQThtH9ijpuzCN9Z1aW4Hp-Kxn_A/edit?gid=0#gid=0" target="_blank" class="card">
            <div class="icon-container">
                <img src="imagens/fds.png" alt="Escala FDS">
            </div>
            Escala FDS
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1YEjCPd7vIHRE5oPAwqrBmUOg7F0zfjfLHh7UN6pP-Lk/edit?gid=1226572451#gid=1226572451" target="_blank" class="card">
            <div class="icon-container">
                <img src="imagens/tec.png" alt="Controle Técnico">
            </div>
            Controle Técnico
        </a>

        <a href="https://sites.google.com/view/roteirogiganet/planos-e-aplicativos?authuser=0" target="_blank" class="card">
            <div class="icon-container">
                <img src="imagens/info.png" alt="Roteiro Giganet">
            </div>
            Roteiro Giganet
        </a>
        
        <a href="javascript:void(0)" class="card" onclick="abrirPDF('extras/oletvativacao.pdf')">
            <div class="icon-container">
                <img src="imagens/cadole.png" alt="Roteiro Giganet">
            </div>
            Ativação - Olé TV
        </a>
        <a href="javascript:void(0)" class="card" onclick="abrirPDF('extras/gigatvcliente.pdf')">
            <div class="icon-container">
                <i class="fas fa-file-pdf"></i>
            </div>
            Giga TV - Ativ. Cliente
        </a>

    </div>
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="fecharPDF()">&times;</span>
            <iframe id="pdfFrame" src="" frameborder="0"></iframe>
        </div>
    </div>
    <script>
        function abrirPDF(caminho) {
            document.getElementById('meuModal').style.display = "block";
            document.getElementById('pdfFrame').src = caminho;
        }
    
        function fecharPDF() {
            document.getElementById('meuModal').style.display = "none";
            document.getElementById('pdfFrame').src = ""; // Limpa para economizar memória
        }
    </script>
</body>
</html>
