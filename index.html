<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Links Profissional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Estilos Visuais Atualizados */
       body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        /* Gradiente baseado no banner do site */
        background: radial-gradient(circle at center, #ff8c00 0%, #b33612 100%);
        background-attachment: fixed;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white; /* Texto do título em branco para contraste */
        .card:hover .icon-container img {
            filter: brightness(0) invert(1);
        }
    }
    
    h1 {
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3); /* Sombra para ler melhor no laranja */
        margin-top: 20px;
    }
    
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 25px;
        width: 90%;
        max-width: 1000px;
        padding: 40px 0;
    }
    
    /* ESTILO DOS BOTÕES (CARDS) */
    .card {
        background: white; /* Fundo branco como no site original */
        padding: 20px 10px;
        border-radius: 15px;
        text-decoration: none;
        color: #d84315; /* Texto em laranja escuro para contraste no branco */
        text-align: center;
        font-weight: bold;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
        border: 3px solid transparent; /* Reserva espaço para a borda no hover */
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    /* EFEITO AO PASSAR O MOUSE */
    .card:hover {
        transform: translateY(-8px);
        border-color: #ffffff; /* Borda branca */
        background: #1c1e21; /* Inverte para um tom escuro como os menus do site */
        color: white;
    }
    
    /* ÍCONES */
    .icon-container {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
    }
    
    .icon-container i, .icon-container img {
        font-size: 45px;
        height: 45px;
        /* Se for ícone do FontAwesome, ele herda a cor do card automaticamente */
    }
    </style>
</head>
<body>

    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
        <h1 style="margin: 0;">Central de Acessos</h1>
        <img src="gigabot02.png" alt="gigabot" style="width: 150px; height: auto;">
    </div>

    <div class="grid-container">
        
        <a href="https://mk.gigams.com.br/mk" target="_blank" class="card">
            <img src="mk.png" alt="MK Solutions" style="width: 50px; height: 50px; margin-bottom: 15px;">
            MK Solutions
        </a>

        <a href="https://10.3.1.15:8081/entrar" target="_blank" class="card">
            <img src="made.png" alt="Made 4 Graph" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Made 4 Graph
        </a>

        <a href="https://giganetms.newave.one/#/panel" target="_blank" class="card">
            <img src="one.png" alt="Newave" style="width: 125px; height: 50px; margin-bottom: 15px;">
            Newave
        </a>

        <a href="https://downdetector.com.br/" target="_blank" class="card">
            <img src="dow.png" alt="DOWNDETECTOR" style="width: 50px; height: 50px; margin-bottom: 15px;">
            DOWNDETECTOR
        </a>

        <a href="https://web.whatsapp.com/" target="_blank" class="card">
            <img src="whats.png" alt="Whatsapp" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Whatsapp
        </a>

        <a href="https://teams.live.com/" target="_blank" class="card">
            <img src="teams.png" alt="Teams" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Teams
        </a>

        <a href="https://extranet.oletelecom.com.br/login.php?retorno=/" target="_blank" class="card">
            <img src="ole.png" alt="Olé TV" style="width: 100px; height: 50px; margin-bottom: 15px;">
            Olé TV
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1PZzEqx6E8VCxQgoVDQJRCM0CoolHWzNGGee0AzcfCcc/edit?gid=0#gid=0" target="_blank" class="card">
            <img src="ramais.png" alt="RAMAIS" style="width: 50px; height: 50px; margin-bottom: 15px;">
            RAMAIS
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1oIu-h83sgEKdUXHLQThtH9ijpuzCN9Z1aW4Hp-Kxn_A/edit?gid=0#gid=0" target="_blank" class="card">
            <img src="fds.png" alt="Escala FDS" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Escala FDS
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1YEjCPd7vIHRE5oPAwqrBmUOg7F0zfjfLHh7UN6pP-Lk/edit?gid=1226572451#gid=1226572451" target="_blank" class="card">
            <img src="tec.png" alt="Controle Técnico" style="width: 50px; height: 50px; margin-bottom: 15px;">
            Controle Técnico
        </a>

    </div>

</body>
</html>
